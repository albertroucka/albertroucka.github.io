<!doctype html>
<html>
<head>
	<meta charset="utf-8"/>
	<meta content="initial-scale=1,maximum-scale=1" name="viewport"/>
	<meta content="yes" name="apple-mobile-web-app-capable"/>
	<meta content="default" name="apple-mobile-web-app-status-bar-style"/>
	<meta content="yes" name="mobile-web-app-capable"/>
	<meta content="#001932" id="theme-color" name="theme-color"/>
	<meta content="Departures" name="application-name"/>
	<meta content="IE=edge" http-equiv="X-UA-Compatible"/>
	<meta http-equiv="refresh" content="20" >
	<style type="text/css">
		:root {
			font-size: 10px;
			font-size: 1vw;
		}

		body {
			box-sizing: border-box;
		}

		html, body {
			height: 100%;
			padding: 0;
			margin: 0;
			overflow: hidden;
			font-family: 'Neo Sans Pro', Helvetica, Arial, Verdana, sans-serif;
			background-color: #001932;
		}

		table {
			border-spacing: 0;
			border-collapse: collapse;
			table-layout: fixed;
		}

		table tr {
			vertical-align: top;
			margin: 0;
			padding: 0;
			height: 0;
		}

		table td {
			margin: 0;
			padding: 0;
			height: 0;
		}

		.main-table {
			width: 100%;
			height: 100%;
		}

		.main-table__info {
			height: 0;
			background: #001932;
		}

		.main-table__heading {
			height: 0;
			background: #3399ff;
		}
		.main-table__heading td {
			position: relative;
		}
		.main-table__heading td div {
			overflow-y: scroll;
		}
		.main-table__heading td:after {
			content: "";
			display: block;
			position: absolute;
			top: 0;
			right: 0;
			width: 2rem;
			background: #3399ff;
			height: 100%;
			z-index: 10;
		}
		.main-table__scroller {
			height: 100%;
			overflow-y: auto;
		}

		.table {
			width: 100%;
		}

		.table__cell {
			text-align: left;
			overflow: hidden;
		}

		.table__cell.table__cell--warning {
			color: #FF0000;
		}

		.table__cell.table__cell--alert {
			color: #CCAA00;
		}

		.table__cell--schedule {
			width: 5%;
			text-align: center;
		}

		.table--content td.table__cell--schedule,
		.table--content th.table__cell--schedule,
		.table--content td.table__cell--via {
			padding-left: 0.5rem;
		}

		.table__cell--expected {
			width: 0%;
		}

		.table__cell--destination {
			width: 42%;
		}

		.table__cell--flight {
			width: 8%;
			text-align: center;
		}

		.table__cell--checkin {
			width: 10%;
			text-align: center;
			white-space: nowrap;
		}

		.table__cell--gate {
			width: 7%;
			text-align: center;
		}

		.table--heading th.table__cell--gate {
			padding: 0;
			text-align: center;
		}

		.table__cell--remark {
			width: 26%;
			text-align: center;
		}

		.table__cell--via {
			width: 100%;
		}

		:root td.table__cell--null {
			height: 0;
			padding: 0;
		}

		.table__cell--info {
			width: 90%;
		}

		.table__cell--info-time {
			width: 20rem;
			padding-left: 5rem;
		}

		.table__cell--info-heading {
			width: 100%;
			text-align: center;
			text-transform: uppercase;
		}

		.table__cell--info-logo {
			width: 33rem;
		}

		.table__cell--info {
			
		}

		.table__row {
			
		}

		:root .table--content tr.table__row--last {
			height: 100%;
			background: #001932;
			display: table-row;
		}

		.table--info {
			color: white;
			font-size: 6rem;
		}

		.table--heading {
			height: 0;
			color: black;
			font-size: 1.5rem;
		}

		.table--heading th {
			padding: 1rem 0 1rem 0.5rem;
			vertical-align: middle;
		}

		.table--content {
			height: 1px;
			color: white;
			font-size: 1.8rem;
			/*text-transform: uppercase;*/
		}

		.table--content tr {
			height: 0;
		}

		.table--content td {
			padding: 1rem 0.5rem;
		}

		.table--content tr:nth-child(odd), .table--content tr.odd {
			background: #001932;
		}

		.table--content tr:nth-child(even), .table--content tr.even {
			background: #365475;
		}

		.logo {
			display: block;

			background-origin: content-box;
			background-position: center;
			background-size: contain;
			background-repeat: no-repeat;

			width: 29rem;
			height: 6rem;
			margin: 1rem 5rem 1rem 0;

			text-decoration: none;
		}

		.case, .spacer {
			display: inline-block;

			background-origin: content-box;
			background-position: center;
			background-size: contain;
			background-repeat: no-repeat;

			width: 3rem;
		}

		.case::before {
			content: "\00a0";
		}

		.time {
		}

		.time__hours, .time__minutes {
			width: 9rem;
			display: inline-block;
		}

		.time__hours {
			text-align: right;
		}

		.time__minutes {
			text-align: left;
		}

		.time__seconds {
			animation: blink 2s infinite;
		}

		@-webkit-keyframes blink {
			0% {
				visibility: hidden;
			}
			49% {
				visibility: hidden;
			}
			50% {
				visibility: visible;
			}
			99% {
				visibility: visible;
			}
			100% {
				visibility: hidden;
			}
		}

		@keyframes blink {
			0% {
				visibility: hidden;
			}
			49% {
				visibility: hidden;
			}
			50% {
				visibility: visible;
			}
			99% {
				visibility: visible;
			}
			100% {
				visibility: hidden;
			}
		}

		/*New code*/

		.slide0 {
			position: relative;
			display:block;
			margin-top: 4.5%;
			max-height: 100%;
			line-height: 0%;
			animation: text-animation0 ease 8s infinite;
		}

		.slide1 {
			position: relative;
			display:block;
			margin-top: 0%;
			max-height: 100%;
			line-height: 0%;
			animation: text-animation1 ease 8s infinite;
		}

		.slide2 {
			position: relative;
			display:block;
			margin-top: 13%;
			max-height: 100%;
			line-height: 0%;
			animation: text-animation0 ease 8s infinite;
		}

		.slide3 {
			position: relative;
			display:block;
			margin-top: 21%;
			max-height: 100%;
			line-height: 0%;
			animation: text-animation0 ease 8s infinite;
		}

		.slide4 {
			position: relative;
			display:block;
			margin-top: 0%;
			max-height: 100%;
			line-height: 0%;
			color: #CCAA00;
			animation: text-animation1 ease 8s infinite;
		}

		@keyframes text-animation0 {
			0% {
				top: 0;
			}
			20% {
				top: 0;
			}
			30% {
				top: -200%;
			}
			50% {
				top: -200%;
			}
			70% {
				top: -200%;
			}
			80% {
				top: 0;
			}
			100%{
				top: 0;
			}
		}

		@keyframes text-animation1 {
			0% {
				top: 200%;
			}
			20% {
				top: 200%;
			}
			30% {
				top: 0;
			}
			50% {
				top: 0;
			}
			70% {
				top: 0;
			}
			80% {
				top: 200%;
			}
			100%{
				top: 200%;
			}
		}

	</style>

</head>

<script language="JavaScript">
	var elmTimeHours = document.getElementById("elmTimeHours");
	var elmTimeMinutes = document.getElementById("elmTimeMinutes");

	function updateTime() {
		var dateTime = new Date();
		var minutes = dateTime.getMinutes();
		var hours = dateTime.getHours();

		elmTimeHours.textContent = hours;
		elmTimeMinutes.textContent = minutes < 10 ? "0" + minutes : minutes;
	}

	setInterval(function () {
		updateTime();
	}, 60000);
	updateTime();

</script>
<script>
//Zdroj dat
async function getData() {
  	const response = await fetch('data.json');
    const data = await response.json();
	const dataJsonStation = data.dataJsonStation;
    const dataJsonDepartures = data.dataJsonDepartures;
    const dataJsonArrivals = data.dataJsonArrivals;
	const station = document.getElementById("station_name");
	station.textContent = dataJsonStation[0].name;
	generateTable(dataJsonDepartures,dataJsonArrivals);
}

function generateTable(departures,arrivals) {
    const tBody = document.getElementById("table-departures");
	/*tBody.style.display = "table-row-group"*/
    
    // Vyčištění stávajícího obsahu
    tBody.innerHTML = "";

    departures.forEach(item => {
        // Vytvoření řádku tabulky
        const tr = document.createElement("tr");

        // 1. Buňka: Datum
        const tdDate = document.createElement("td");
        tdDate.className = "table__cell table__cell--checkin";
        tdDate.textContent = item.date;
        const spacer = document.createElement("span");
        spacer.className = "spacer";
        tdDate.appendChild(spacer);
        tr.appendChild(tdDate);

        // 2. Buňka: Čas
        const tdTime = document.createElement("td");
        tdTime.className = "table__cell table__cell--schedule";
		if (item.expected) {
        	const scheduled = document.createElement("div");
        	scheduled.className = "slide3";
        	scheduled.textContent = item.time;

        	const expected = document.createElement("div");
        	expected.className = "slide4";
        	expected.textContent = item.expected;

        	tdTime.appendChild(scheduled);
        	tdTime.appendChild(expected);
        	tr.appendChild(tdTime);
		}
		else {
			tdTime.textContent = item.time;
			tr.appendChild(tdTime);
		}


        // 3. Buňka: Linka
        const tdRoute = document.createElement("td");
        tdRoute.className = "table__cell table__cell--flight";
		if (item.sharecode) {
        	const original = document.createElement("div");
        	original.className = "slide2";
        	original.textContent = item.route;

        	const sharecode = document.createElement("div");
        	sharecode.className = "slide1";
        	sharecode.textContent = item.sharecode;

        	tdRoute.appendChild(original);
        	tdRoute.appendChild(sharecode);
        	tr.appendChild(tdRoute);
		}
		else {
			tdRoute.textContent = item.route;
			tr.appendChild(tdRoute);
		}

        // 4. Buňka: Destinace
        const tdDestination = document.createElement("td");
        tdDestination.className = "table__cell table__cell--destination";
        tdDestination.textContent = item.destination;
        tr.appendChild(tdDestination);

        // 5. Buňka: Gate
        const tdGate = document.createElement("td");
        tdGate.className = "table__cell table__cell--gate";
        tdGate.textContent = item.gate;
        tr.appendChild(tdGate);

        // 6. Buňka: Status (CZ / EN)
        const tdStatus = document.createElement("td");
		const divCZ = document.createElement("div");
		const divEN = document.createElement("div");
		divCZ.className = "slide0";
		divEN.className = "slide1";

		if (item.status == "A"){
        	tdStatus.className = "table__cell table__cell--remark";
			divCZ.textContent = "Odbavení";
			divEN.textContent = "CHECK-IN";
		}
		else if (item.status == "B"){
			tdStatus.className = "table__cell table__cell--remark";
			divCZ.textContent = "Východ otevřen";
			divEN.textContent = "GATE OPEN";
		}
		else if (item.status == "C"){
			tdStatus.className = "table__cell table__cell--remark table__cell--alert";
			divCZ.textContent = "Nástup";
			divEN.textContent = "BOARDING";
		}
		else if (item.status == "D"){
			tdStatus.className = "table__cell table__cell--remark table__cell--warning";
			divCZ.textContent = "Poslední výzva";
			divEN.textContent = "LAST CALL";
		}
		else if (item.status == "E"){
			tdStatus.className = "table__cell table__cell--remark";
			divCZ.textContent = "Nástup ukončen";
			divEN.textContent = "GATE CLOSED";
		}
		else if (item.status == "CL"){
			tdStatus.className = "table__cell table__cell--remark table__cell--warning";
			divCZ.textContent = "Zrušeno";
			divEN.textContent = "CANCELLED";
		}
		else if (item.status.startsWith("NI") && item.status.length == 7){
			tdStatus.className = "table__cell table__cell--remark";
			divCZ.textContent = "Další informace " + item.status.slice(2);
			divEN.textContent = "NEXT INFO " + item.status.slice(2);
		}
			
		else if (item.status.match(/^\d/)){
			tdStatus.className = "table__cell table__cell--remark";
			divCZ.textContent = "Odjelo " + item.status;
			divEN.textContent = "DEPARTED " + item.status;
		}
		else {
			tdStatus.className = "table__cell table__cell--remark";
		}

        tdStatus.appendChild(divCZ);
        tdStatus.appendChild(divEN);
        tr.appendChild(tdStatus);

        // Přidání hotového řádku do tabulky
        tBody.appendChild(tr);

		// Přidání přes
		if (item.via){
			const tr = document.createElement("tr");
			const tdVia = document.createElement("td");
			tdVia.colSpan = 7;
			for (let i = 1; i <= 7; i++) {
  				const td = document.createElement("td");
  				td.className = "";
  
  				// Pokud jsme na 5. sloupci, vložíme text
				if (i === 3) {
					td.className = "table__cell table__cell--flight";
					const original = document.createElement("div");
        			original.className = "slide2";
        			original.textContent = "přes";

        			const sharecode = document.createElement("div");
        			sharecode.className = "slide1";
        			sharecode.textContent = "VIA";

        			td.appendChild(original);
        			td.appendChild(sharecode);
  				}

  				if (i === 4) {
    				td.textContent = item.via;
  				}
  
  				tr.appendChild(td);
			}
			tBody.appendChild(tr);
		}
	});

	if (arrivals.length) {
		const tr = document.createElement("tr");
		const tdArr = document.createElement("td");
		tdArr.colSpan = 7;
		tdArr.textContent = "PŘÍJEZDY:";
		tr.appendChild(tdArr);
		tBody.appendChild(tr);
	} 

	arrivals.forEach(item => {
        // Vytvoření řádku tabulky
        const tr = document.createElement("tr");

        // 1. Buňka: Datum
        const tdDate = document.createElement("td");
        tdDate.className = "table__cell table__cell--checkin";
        tdDate.textContent = item.date;
        const spacer = document.createElement("span");
        spacer.className = "spacer";
        tdDate.appendChild(spacer);
        tr.appendChild(tdDate);

        // 2. Buňka: Čas
        const tdTime = document.createElement("td");
        tdTime.className = "table__cell table__cell--schedule";
		tdTime.textContent = item.time;
		tr.appendChild(tdTime);

        // 3. Buňka: Linka
        const tdRoute = document.createElement("td");
        tdRoute.className = "table__cell table__cell--flight";
		if (item.sharecode) {
        	const original = document.createElement("div");
        	original.className = "slide2";
        	original.textContent = item.route;

        	const sharecode = document.createElement("div");
        	sharecode.className = "slide1";
        	sharecode.textContent = item.sharecode;

        	tdRoute.appendChild(original);
        	tdRoute.appendChild(sharecode);
        	tr.appendChild(tdRoute);
		}
		else {
			tdRoute.textContent = item.route;
			tr.appendChild(tdRoute);
		}

        // 4. Buňka: Destinace
        const tdDestination = document.createElement("td");
        tdDestination.className = "table__cell table__cell--destination";
        tdDestination.textContent = item.destination;
        tr.appendChild(tdDestination);

        // 5. Buňka: Gate
        const tdGate = document.createElement("td");
        tdGate.className = "table__cell table__cell--gate";
        tdGate.textContent = item.gate;
        tr.appendChild(tdGate);

        // 6. Buňka: Status (CZ / EN)
        const tdStatus = document.createElement("td");
		const divCZ = document.createElement("div");
		const divEN = document.createElement("div");
		divCZ.className = "slide0";
		divEN.className = "slide1";

		if (item.status.startsWith("E") && item.status.length == 6){
        	tdStatus.className = "table__cell table__cell--remark";
			divCZ.textContent = "Předpoklad " + item.status.slice(1);
			divEN.textContent = "EXPECTED " + item.status.slice(1);
		}
		else if (item.status.startsWith("A") && item.status.length == 6){
			tdStatus.className = "table__cell table__cell--remark";
			divCZ.textContent = "Přijelo " + item.status.slice(1);
			divEN.textContent = "ARRIVED " + item.status.slice(1);
		}
		else if (item.status.startsWith("D")){
			tdStatus.className = "table__cell table__cell--remark";
			divCZ.textContent = "Zpožděno";
			divEN.textContent = "DELAYED";
		}
		else if (item.status == "CL"){
			tdStatus.className = "table__cell table__cell--remark table__cell--warning";
			divCZ.textContent = "Zrušeno";
			divEN.textContent = "CANCELLED";
		}
		else {
			tdStatus.className = "table__cell table__cell--remark";
		}

        tdStatus.appendChild(divCZ);
        tdStatus.appendChild(divEN);
        tr.appendChild(tdStatus);

        // Přidání hotového řádku do tabulky
        tBody.appendChild(tr);

	});

	/*const tr = document.createElement("tr");
	const tdEnd = document.createElement("td");
	tdEnd.colSpan = 7;
	tdEnd.className = "table--content table__row--last";
	document.body.style.backgroundColor = tdEnd.backgroundColor;
	tr.appendChild(tdEnd);
	tBody.appendChild(tr);*/
}

// Spuštění generování po načtení skriptu
setInterval(function () { getData(); }, 8000);
getData();
</script>
